name: Sync MEC events to MAIN schedule CSV

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes

permissions:
  contents: write

concurrency:
  group: sync-mec-to-csv
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify main branch
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "ERROR: Expected main branch. Refusing to continue."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check MEC secrets
        shell: bash
        env:
          MEC_BASE_URL: ${{ secrets.MEC_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_TOKEN }}
        run: |
          if [ -z "$MEC_BASE_URL" ]; then
            echo "ERROR: MEC_BASE_URL secret is missing."
            exit 1
          fi

          if [ -z "$MEC_TOKEN" ]; then
            echo "ERROR: MEC_TOKEN secret is missing."
            exit 1
          fi

          echo "Main MEC base URL and token are configured."
      - name: Show MEC host and debug Central Services event
        env:
          MEC_BASE_URL: ${{ secrets.MEC_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_TOKEN }}
          TARGET_EVENT_ID: "26031"
        run: |
          python - <<'PY'
          import os
          import json
          import requests
          from urllib.parse import urlparse

          base = os.environ["MEC_BASE_URL"].rstrip("/")
          token = os.environ["MEC_TOKEN"]
          event_id = os.environ["TARGET_EVENT_ID"]

          print("[debug] MEC host:", urlparse(base).netloc)

          url = f"{base}/events/{event_id}"
          r = requests.get(url, headers={"mec-token": token}, timeout=60)

          print(f"[target] GET /events/{event_id} -> {r.status_code}")

          if r.status_code != 200:
              print("[target] body:", r.text[:500])
              raise SystemExit(0)

          payload = r.json()
          data = payload.get("data", {}) if isinstance(payload, dict) else {}

          print("[target] title:", data.get("title"))
          print("[target] permalink:", data.get("permalink"))
          print("[target] status:", data.get("status") or data.get("post_status") or data.get("event_status"))
          print("[target] data keys:", list(data.keys()))
          print("[target] date keys:", list((data.get("date") or {}).keys()) if isinstance(data.get("date"), dict) else "no date block")
          print("[target] location keys:", list((data.get("locations") or {}).keys()) if isinstance(data.get("locations"), dict) else "no locations")

          wanted_words = (
              "date", "dates", "day", "days", "repeat", "repeating",
              "occurrence", "occurrences", "start", "end", "time",
              "mec_start", "mec_end", "mec_repeat", "mec_in_days"
          )

          matches = []

          def walk(obj, path="root"):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      key_text = str(k).lower()
                      next_path = f"{path}.{k}"

                      if any(word in key_text for word in wanted_words):
                          matches.append((next_path, v))

                      walk(v, next_path)

              elif isinstance(obj, list):
                  for i, v in enumerate(obj):
                      walk(v, f"{path}[{i}]")

          walk(payload)

          print("[target] date-related matches:", len(matches))

          for path, value in matches[:100]:
              try:
                  compact = json.dumps(value, ensure_ascii=False)
              except Exception:
                  compact = str(value)
              if len(compact) > 500:
                  compact = compact[:500] + "..."
              print(f"[target-path] {path} = {compact}")

          if len(matches) > 100:
              print(f"[target] showing first 100 of {len(matches)} date-related matches")
          PY
      - name: Build CSV from MEC
        env:
          MEC_BASE_URL: ${{ secrets.MEC_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_TOKEN }}
          CSV_PATH: "Clinic Master Schedule for git.csv"
          MEC_WINDOW_DAYS: "365"
          MEC_START: "2010-01-01"
          MEC_END: "2030-12-31"
          MEC_LIMIT: "200"
          MAX_PAGES: "50"
          MAX_SPAN_DAYS: "10"
          CSV_DELIMITER: "comma" # IMPORTANT: your schedule JS expects commas
          DATE_FORMAT: "mdy"
          POPUP_ALLDAY: "1"
          MEC_DEBUG: "1"
          EXTRA_EVENT_IDS: "26031"
        run: |
          python scripts/sync_mec_to_csv.py

      - name: Show CSV diff
        shell: bash
        run: |
          git status --short
          git diff --stat -- "Clinic Master Schedule for git.csv" || true
          git diff -- "Clinic Master Schedule for git.csv" | head -n 200 || true

      - name: Final branch safety check before push
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch before push: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "ERROR: Not on main branch. Refusing to push."
            exit 1
          fi

      - name: Commit changes if any
        shell: bash
        run: |
          if git diff --quiet -- "Clinic Master Schedule for git.csv"; then
            echo "No CSV changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Clinic Master Schedule for git.csv"
          git commit -m "Sync MEC events -> MAIN schedule CSV"
          git push origin HEAD:main

      - name: Upload CSV to RAM website
        if: github.ref == 'refs/heads/main'
        env:
          SFTP_PROD_HOST: ${{ secrets.SFTP_PROD_HOST }}
          SFTP_PROD_PORT: ${{ secrets.SFTP_PROD_PORT }}
          SFTP_PROD_USERNAME: ${{ secrets.SFTP_PROD_USERNAME }}
          SFTP_PROD_PRIVATE_KEY: ${{ secrets.SFTP_PROD_PRIVATE_KEY }}
          SFTP_PROD_REMOTE_CSV_PATH: ${{ secrets.SFTP_PROD_REMOTE_CSV_PATH }}
        run: |
          echo "Website CSV upload started"

          # Write private key — GitHub Actions masks the value in logs
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SFTP_PROD_PRIVATE_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key

          # Add server host key to known_hosts (-H hashes the entry for privacy)
          ssh-keyscan -p "$SFTP_PROD_PORT" -H "$SFTP_PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Derive remote directory and temp path from the full remote CSV path
          REMOTE_DIR="$(dirname "$SFTP_PROD_REMOTE_CSV_PATH")"
          REMOTE_TMP="${SFTP_PROD_REMOTE_CSV_PATH}.tmp"

          # Ensure remote directory exists
          ssh -i ~/.ssh/prod_key -p "$SFTP_PROD_PORT" \
            -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "${SFTP_PROD_USERNAME}@${SFTP_PROD_HOST}" \
            "mkdir -p '$REMOTE_DIR'"

          # Upload to a temporary file to avoid a partial read by the website
          scp -i ~/.ssh/prod_key -P "$SFTP_PROD_PORT" \
            -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "Clinic Master Schedule for git.csv" \
            "${SFTP_PROD_USERNAME}@${SFTP_PROD_HOST}:${REMOTE_TMP}"

          # Atomically move into place and set world-readable permissions
          ssh -i ~/.ssh/prod_key -p "$SFTP_PROD_PORT" \
            -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "${SFTP_PROD_USERNAME}@${SFTP_PROD_HOST}" \
            "mv '$REMOTE_TMP' '$SFTP_PROD_REMOTE_CSV_PATH' && chmod 644 '$SFTP_PROD_REMOTE_CSV_PATH'"

          # Remove key from runner disk (runner is ephemeral, but belt-and-suspenders)
          rm -f ~/.ssh/prod_key

          echo "Website CSV upload completed"

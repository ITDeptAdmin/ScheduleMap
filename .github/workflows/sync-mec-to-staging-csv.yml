name: Sync MEC events to STAGING schedule CSV

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: generate CSV but do not commit or push"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: staging-csv-sync
  cancel-in-progress: true

jobs:
  sync-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Verify staging branch
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "staging" ]; then
            echo "ERROR: Expected staging branch. Refusing to continue."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check staging MEC secrets
        shell: bash
        env:
          MEC_STAGING_BASE_URL: ${{ secrets.MEC_STAGING_BASE_URL }}
          MEC_STAGING_TOKEN: ${{ secrets.MEC_STAGING_TOKEN }}
        run: |
          if [ -z "$MEC_STAGING_BASE_URL" ]; then
            echo "ERROR: MEC_STAGING_BASE_URL secret is missing."
            exit 1
          fi

          if [ -z "$MEC_STAGING_TOKEN" ]; then
            echo "ERROR: MEC_STAGING_TOKEN secret is missing."
            exit 1
          fi

          echo "Staging MEC base URL and token are configured."

      - name: Show MEC host and debug target event
        env:
          MEC_BASE_URL: ${{ secrets.MEC_STAGING_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_STAGING_TOKEN }}
          TARGET_EVENT_ID: "25315"
        run: |
          python - <<'PY'
          import os
          import json
          import requests
          from urllib.parse import urlparse

          base = os.environ["MEC_BASE_URL"].rstrip("/")
          token = os.environ["MEC_TOKEN"]
          event_id = os.environ["TARGET_EVENT_ID"]

          print("[debug] MEC host:", urlparse(base).netloc)

          url = f"{base}/events/{event_id}"
          r = requests.get(url, headers={"mec-token": token}, timeout=60)

          print(f"[target] GET /events/{event_id} -> {r.status_code}")

          if r.status_code != 200:
              print("[target] body:", r.text[:500])
              raise SystemExit(0)

          payload = r.json()
          data = payload.get("data", {}) if isinstance(payload, dict) else {}

          print("[target] title:", data.get("title"))
          print("[target] permalink:", data.get("permalink"))
          print("[target] status:", data.get("status") or data.get("post_status") or data.get("event_status"))
          print("[target] data keys:", list(data.keys()))
          print("[target] date keys:", list((data.get("date") or {}).keys()) if isinstance(data.get("date"), dict) else "no date block")
          print("[target] location keys:", list((data.get("locations") or {}).keys()) if isinstance(data.get("locations"), dict) else "no locations")

          wanted_words = (
              "date", "dates", "day", "days", "repeat", "repeating",
              "occurrence", "occurrences", "start", "end", "time",
              "mec_start", "mec_end", "mec_repeat"
          )

          wanted_values = (
              "2026-06-17", "2026-06-24",
              "2026-07-15", "2026-07-22",
              "2026-08-19", "2026-08-26",
              "06/17", "6/17", "06/24", "6/24",
              "07/15", "7/15", "07/22", "7/22",
              "08/19", "8/19", "08/26", "8/26"
          )

          matches = []

          def walk(obj, path="root"):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      key_text = str(k).lower()
                      next_path = f"{path}.{k}"

                      if any(word in key_text for word in wanted_words):
                          matches.append((next_path, v))

                      walk(v, next_path)

              elif isinstance(obj, list):
                  for i, v in enumerate(obj):
                      walk(v, f"{path}[{i}]")

              else:
                  text = str(obj)
                  if any(val in text for val in wanted_values):
                      matches.append((path, obj))

          walk(payload)

          print("[target] date-related matches:", len(matches))

          for path, value in matches[:80]:
              try:
                  compact = json.dumps(value, ensure_ascii=False)
              except Exception:
                  compact = str(value)
              if len(compact) > 300:
                  compact = compact[:300] + "..."
              print(f"[target-path] {path} = {compact}")

          if len(matches) > 80:
              print(f"[target] showing first 80 of {len(matches)} date-related matches")
          PY
      - name: Build CSV from staging MEC
        env:
          MEC_BASE_URL: ${{ secrets.MEC_STAGING_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_STAGING_TOKEN }}
          CSV_PATH: "Clinic Master Schedule for git.csv"
          MEC_WINDOW_DAYS: "365"
          MEC_START: "2010-01-01"
          MEC_END: "2030-12-31"
          MEC_LIMIT: "200"
          MAX_PAGES: "50"
          MAX_SPAN_DAYS: "10"
          CSV_DELIMITER: "comma"
          DATE_FORMAT: "mdy"
          POPUP_ALLDAY: "1"
          MEC_DEBUG: "1"
          EXTRA_EVENT_IDS: "25315"
        run: |
          python scripts/sync_mec_to_csv.py

      - name: Show CSV diff
        shell: bash
        run: |
          git status --short
          git diff --stat -- "Clinic Master Schedule for git.csv" || true
          git diff -- "Clinic Master Schedule for git.csv" | head -n 200 || true

      - name: Stop before commit during dry run
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "Dry run enabled. CSV was generated but will not be committed or pushed."

      - name: Final branch safety check before push
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch before push: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "staging" ]; then
            echo "ERROR: Not on staging branch. Refusing to push."
            exit 1
          fi

      - name: Commit staging CSV changes if any
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          if git diff --quiet -- "Clinic Master Schedule for git.csv"; then
            echo "No CSV changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Clinic Master Schedule for git.csv"
          git commit -m "Sync MEC events -> STAGING schedule CSV"
          git push origin HEAD:staging

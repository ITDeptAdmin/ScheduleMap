name: Sync MEC events to STAGING schedule CSV

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: generate CSV but do not commit or push"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: staging-csv-sync
  cancel-in-progress: true

jobs:
  sync-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Verify staging branch
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "staging" ]; then
            echo "ERROR: Expected staging branch. Refusing to continue."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check staging MEC secrets
        shell: bash
        env:
          MEC_STAGING_BASE_URL: ${{ secrets.MEC_STAGING_BASE_URL }}
          MEC_STAGING_TOKEN: ${{ secrets.MEC_STAGING_TOKEN }}
        run: |
          if [ -z "$MEC_STAGING_BASE_URL" ]; then
            echo "ERROR: MEC_STAGING_BASE_URL secret is missing."
            exit 1
          fi

          if [ -z "$MEC_STAGING_TOKEN" ]; then
            echo "ERROR: MEC_STAGING_TOKEN secret is missing."
            exit 1
          fi

          echo "Staging MEC base URL and token are configured."

     
      - name: Build CSV from staging MEC
        env:
          MEC_BASE_URL: ${{ secrets.MEC_STAGING_BASE_URL }}
          MEC_TOKEN: ${{ secrets.MEC_STAGING_TOKEN }}
          CSV_PATH: "Clinic Master Schedule for git.csv"
          MEC_WINDOW_DAYS: "365"
          MEC_START: "2010-01-01"
          MEC_END: "2030-12-31"
          MEC_LIMIT: "200"
          MAX_PAGES: "50"
          MAX_SPAN_DAYS: "10"
          CSV_DELIMITER: "comma"
          DATE_FORMAT: "mdy"
          POPUP_ALLDAY: "1"
          MEC_DEBUG: "1"
          EXTRA_EVENT_IDS: "25315"
          MIN_ROW_COUNT: "50"
        run: |
          python scripts/sync_mec_to_csv.py

      - name: Show CSV diff
        shell: bash
        run: |
          git status --short
          git diff --stat -- "Clinic Master Schedule for git.csv" || true
          git diff -- "Clinic Master Schedule for git.csv" | head -n 200 || true

      - name: Stop before commit during dry run
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "Dry run enabled. CSV was generated but will not be committed or pushed."

      - name: Final branch safety check before push
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          CURRENT_BRANCH="$(git branch --show-current)"
          echo "Current branch before push: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" != "staging" ]; then
            echo "ERROR: Not on staging branch. Refusing to push."
            exit 1
          fi

      - name: Commit staging CSV changes if any
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          if git diff --quiet -- "Clinic Master Schedule for git.csv"; then
            echo "No CSV changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Clinic Master Schedule for git.csv"
          git commit -m "Sync MEC events -> STAGING schedule CSV"
          git push origin HEAD:staging
